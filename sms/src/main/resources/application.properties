####################################
# SERVER
####################################
server.port=8080
server.servlet.context-path=/
spring.application.name=Student Management System (SMS-ERP)

####################################
# DATABASE (MySQL)
####################################
spring.datasource.url=jdbc:mysql://localhost:3306/sms_erp_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=DARSAN2007
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

####################################
# JPA / HIBERNATE
####################################
# 'update' is convenient for the mini-project; schema.sql below is the source of truth for a clean install.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Run schema.sql / data.sql on startup only when explicitly asked (see README for first-run instructions)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

####################################
# THYMELEAF
####################################
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

####################################
# FILE UPLOAD (assignments, profile photos)
####################################
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

####################################
# MAIL (optional - notifications). Disabled by default for localhost use.
####################################
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.notifications.email-enabled=false

####################################
# LOGGING
####################################
logging.level.root=INFO
logging.level.com.college.sms=DEBUG
logging.level.org.springframework.security=INFO

####################################
# APP-SPECIFIC CONSTANTS
####################################
app.attendance.risk.green-threshold=85
app.attendance.risk.yellow-threshold=75
app.performance.excellent-threshold=80
app.performance.average-threshold=50
