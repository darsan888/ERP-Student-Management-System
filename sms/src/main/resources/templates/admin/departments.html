<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments | CampusERP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/admin-sidebar :: sidebar('departments')}"></div>
    <div class="main-content">
        <div class="topbar">
            <h5>Departments</h5>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button class="btn btn-sm btn-outline-danger" type="submit"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </form>
        </div>
        <div class="content-area">
            <div class="panel mb-4">
                <h6 class="fw-bold mb-3">Add Department</h6>
                <form th:action="@{/admin/departments/add}" method="post" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Department Name</label>
                        <input type="text" name="departmentName" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Department Code</label>
                        <input type="text" name="departmentCode" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">HOD Name</label>
                        <input type="text" name="hodName" class="form-control">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-primary w-100" type="submit"><i class="fa-solid fa-plus"></i> Add</button>
                    </div>
                </form>
            </div>
            <div class="panel">
                <h6 class="fw-bold mb-3">All Departments</h6>
                <table class="table table-hover align-middle">
                    <thead><tr><th>Name</th><th>Code</th><th>HOD</th></tr></thead>
                    <tbody>
                    <tr th:each="d : ${departments}">
                        <td th:text="${d.departmentName}">Name</td>
                        <td th:text="${d.departmentCode}">Code</td>
                        <td th:text="${d.hodName} ?: '-'">HOD</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(departments)}">
                        <td colspan="3" class="text-muted text-center">No departments found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
