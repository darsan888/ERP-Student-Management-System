<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students | CampusERP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/admin-sidebar :: sidebar('students')}"></div>
    <div class="main-content">
        <div class="topbar">
            <h5>Students</h5>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button class="btn btn-sm btn-outline-danger" type="submit"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </form>
        </div>
        <div class="content-area">
            <div class="alert alert-success" th:if="${success}" th:text="${success}">Success</div>
            <div class="alert alert-danger" th:if="${error}" th:text="${error}">Error</div>
            <div class="panel mb-4">
                <h6 class="fw-bold mb-3">Add Student</h6>
                <p class="text-muted small">This creates both the student profile and their individual login account so they can sign in to the Student Portal.</p>
                <form th:action="@{/admin/students/add}" method="post" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="fullName" class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Register Number</label>
                        <input type="text" name="registerNumber" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Department</label>
                        <select name="departmentId" class="form-select" required>
                            <option th:each="d : ${departments}" th:value="${d.departmentId}" th:text="${d.departmentName}">Dept</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Semester</label>
                        <select name="semesterNumber" class="form-select" required>
                            <option th:each="n : ${#numbers.sequence(1,8)}" th:value="${n}" th:text="'Semester ' + ${n}">Semester 1</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Admission Year</label>
                        <input type="number" name="admissionYear" class="form-control" th:value="${#dates.year(#dates.createNow())}" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Gender</label>
                        <select name="gender" class="form-select">
                            <option value="">--</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" name="dateOfBirth" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Address</label>
                        <input type="text" name="address" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Guardian Name</label>
                        <input type="text" name="guardianName" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Guardian Phone</label>
                        <input type="text" name="guardianPhone" class="form-control">
                    </div>

                    <div class="col-12"><hr class="my-1"><span class="text-muted small">Login credentials</span></div>
                    <div class="col-md-4">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-primary" type="submit"><i class="fa-solid fa-plus"></i> Add Student</button>
                    </div>
                </form>
            </div>
            <div class="panel">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="fw-bold mb-0">All Students</h6>
                    <form th:action="@{/admin/students}" method="get" class="d-flex gap-2">
                        <input type="text" name="regNo" th:value="${regNo}" class="form-control form-control-sm" placeholder="Search by Register No">
                        <button class="btn btn-sm btn-outline-primary" type="submit"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
                        <a th:if="${regNo}" class="btn btn-sm btn-outline-secondary" th:href="@{/admin/students}">Clear</a>
                    </form>
                </div>
                <table class="table table-hover align-middle">
                    <thead><tr><th>Name</th><th>Register No</th><th>Department</th><th>Semester</th><th></th></tr></thead>
                    <tbody>
                    <tr th:each="s : ${studentList}">
                        <td th:text="${s.fullName}">Name</td>
                        <td th:text="${s.registerNumber}">Reg</td>
                        <td th:text="${s.department != null ? s.department.departmentName : '-'}">Dept</td>
                        <td th:text="${s.currentSemester != null ? s.currentSemester.semesterNumber : '-'}">1</td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{'/admin/students/' + ${s.studentId}}"><i class="fa-solid fa-eye"></i> View</a>
                            <form th:action="@{'/admin/students/' + ${s.studentId} + '/delete'}" method="post" class="d-inline"
                                  onsubmit="return confirm('Remove this student and their login account? This cannot be undone.');">
                                <button class="btn btn-sm btn-outline-danger" type="submit"><i class="fa-solid fa-trash"></i> Remove</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(studentList)}">
                        <td colspan="5" class="text-muted text-center">No students found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
