<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${department.departmentName} + ' Report | CampusERP'">Report</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; color: #111; margin: 40px; }
        h1 { font-size: 22px; margin-bottom: 0; }
        .subtitle { color: #666; margin-top: 4px; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 28px; }
        th, td { border: 1px solid #ccc; padding: 8px 10px; text-align: left; font-size: 13px; }
        th { background: #f3f4f6; }
        h2 { font-size: 16px; margin-top: 30px; border-bottom: 2px solid #333; padding-bottom: 4px; }
        .print-bar { margin-bottom: 20px; }
        @media print { .print-bar { display: none; } }
    </style>
</head>
<body>
<div class="print-bar">
    <button onclick="window.print()">Print / Save as PDF</button>
</div>

<h1 th:text="${department.departmentName} + ' — Department Report'">Department Report</h1>
<div class="subtitle">
    Code: <span th:text="${department.departmentCode}">CODE</span> &middot;
    HOD: <span th:text="${department.hodName} ?: 'Not set'">HOD</span> &middot;
    Generated: <span th:text="${generatedAt}">date</span>
</div>

<h2>Faculty (<span th:text="${#lists.size(facultyList)}">0</span>)</h2>
<table>
    <thead><tr><th>Name</th><th>Employee Code</th><th>Designation</th><th>Phone</th></tr></thead>
    <tbody>
    <tr th:each="f : ${facultyList}">
        <td th:text="${f.fullName}">Name</td>
        <td th:text="${f.employeeCode}">Code</td>
        <td th:text="${f.designation} ?: '-'">Designation</td>
        <td th:text="${f.phone} ?: '-'">Phone</td>
    </tr>
    <tr th:if="${#lists.isEmpty(facultyList)}"><td colspan="4">No faculty found.</td></tr>
    </tbody>
</table>

<h2>Students (<span th:text="${#lists.size(students)}">0</span>)</h2>
<table>
    <thead><tr><th>Name</th><th>Register No.</th><th>Semester</th></tr></thead>
    <tbody>
    <tr th:each="s : ${students}">
        <td th:text="${s.fullName}">Name</td>
        <td th:text="${s.registerNumber}">Reg</td>
        <td th:text="${s.currentSemester != null ? s.currentSemester.semesterNumber : '-'}">1</td>
    </tr>
    <tr th:if="${#lists.isEmpty(students)}"><td colspan="3">No students found.</td></tr>
    </tbody>
</table>

</body>
</html>
