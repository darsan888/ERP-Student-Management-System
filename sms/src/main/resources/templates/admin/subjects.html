<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects | CampusERP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/admin-sidebar :: sidebar('subjects')}"></div>
    <div class="main-content">
        <div class="topbar">
            <h5>Subjects</h5>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button class="btn btn-sm btn-outline-danger" type="submit"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </form>
        </div>
        <div class="content-area">
            <div class="alert alert-success" th:if="${success}" th:text="${success}">Success</div>
            <div class="alert alert-danger" th:if="${error}" th:text="${error}">Error</div>
            <div class="panel mb-4">
                <h6 class="fw-bold mb-3">Add Subject</h6>
                <form th:action="@{/admin/subjects/add}" method="post" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Subject Name</label>
                        <input type="text" name="subjectName" class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Subject Code</label>
                        <input type="text" name="subjectCode" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Department</label>
                        <select name="departmentId" class="form-select" required>
                            <option th:each="d : ${departments}" th:value="${d.departmentId}" th:text="${d.departmentName}">Dept</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Semester</label>
                        <select name="semesterNumber" class="form-select" required>
                            <option th:each="n : ${#numbers.sequence(1,8)}" th:value="${n}" th:text="'Semester ' + ${n}">Semester 1</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <label class="form-label">Credits</label>
                        <input type="number" name="credits" class="form-control" min="1" max="10" value="3" required>
                    </div>
                    <div class="col-md-1 d-flex align-items-end">
                        <div class="form-check">
                            <input type="checkbox" name="isLab" class="form-check-input" id="isLab" value="true">
                            <label class="form-check-label" for="isLab">Lab</label>
                        </div>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-primary" type="submit"><i class="fa-solid fa-plus"></i> Add Subject</button>
                    </div>
                </form>
                <p class="text-muted small mb-0" th:if="${#lists.isEmpty(departments)}">
                    No departments exist yet — add a Department first before adding subjects.
                </p>
            </div>
            <div class="panel">
                <h6 class="fw-bold mb-3">All Subjects</h6>
                <table class="table table-hover align-middle">
                    <thead><tr><th>Name</th><th>Code</th><th>Semester</th><th>Credits</th><th>Lab?</th><th></th></tr></thead>
                    <tbody>
                    <tr th:each="s : ${subjects}">
                        <td th:text="${s.subjectName}">Name</td>
                        <td th:text="${s.subjectCode}">Code</td>
                        <td th:text="${s.semester != null ? s.semester.semesterNumber : '-'}">1</td>
                        <td th:text="${s.credits}">3</td>
                        <td>
                            <span class="badge" th:classappend="${s.isLab} ? 'bg-info text-dark' : 'bg-secondary'" th:text="${s.isLab} ? 'Lab' : 'Theory'">Theory</span>
                        </td>
                        <td class="text-end">
                            <form th:action="@{'/admin/subjects/' + ${s.subjectId} + '/delete'}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete this subject? This cannot be undone.');">
                                <button class="btn btn-sm btn-outline-danger" type="submit"><i class="fa-solid fa-trash"></i> Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(subjects)}">
                        <td colspan="6" class="text-muted text-center">No subjects found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
