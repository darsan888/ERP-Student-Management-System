<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments | CampusERP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/faculty-sidebar :: sidebar('assignments')}"></div>
    <div class="main-content">
        <div class="topbar">
            <h5>Assignments</h5>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button class="btn btn-sm btn-outline-danger" type="submit"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </form>
        </div>
        <div class="content-area">
            <div class="alert alert-success" th:if="${success}" th:text="${success}">Success</div>
            <div class="panel mb-4">
                <h6 class="fw-bold mb-3">Post a New Assignment</h6>
                <form th:action="@{/faculty/assignments/add}" method="post" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Subject</label>
                        <select name="subjectId" class="form-select" required>
                            <option th:each="fs : ${assignedSubjects}" th:value="${fs.subject.subjectId}" th:text="${fs.subject.subjectName}">Subject</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Title</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Due Date &amp; Time</label>
                        <input type="datetime-local" name="dueDate" class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Max Marks</label>
                        <input type="number" name="maxMarks" class="form-control" step="0.01" value="10" required>
                    </div>
                    <div class="col-md-1 d-flex align-items-end">
                        <button class="btn btn-primary w-100" type="submit"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="2" placeholder="Optional instructions for students"></textarea>
                    </div>
                </form>
                <p class="text-muted small mb-0" th:if="${#lists.isEmpty(assignedSubjects)}">
                    No subjects assigned yet — ask an admin to assign a subject to you before posting assignments.
                </p>
            </div>
            <div class="panel">
                <h6 class="fw-bold mb-3">Assignments I've Posted</h6>
                <table class="table table-hover align-middle">
                    <thead>
                    <tr><th>Subject</th><th>Title</th><th>Due Date</th><th>Max Marks</th><th></th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="a : ${myAssignments}">
                        <td th:text="${a.subject.subjectName}">Subject</td>
                        <td th:text="${a.title}">Title</td>
                        <td th:text="${a.dueDate}">-</td>
                        <td th:text="${a.maxMarks}">10</td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{'/faculty/assignments/' + ${a.assignmentId} + '/submissions'}">
                                <i class="fa-solid fa-users"></i> Submissions
                            </a>
                            <form th:action="@{'/faculty/assignments/' + ${a.assignmentId} + '/delete'}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete this assignment and all its submissions?');">
                                <button class="btn btn-sm btn-outline-danger" type="submit"><i class="fa-solid fa-trash"></i> Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(myAssignments)}">
                        <td colspan="5" class="text-muted text-center">No assignments posted yet.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
