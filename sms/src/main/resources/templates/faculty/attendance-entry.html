<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Attendance | CampusERP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/faculty-sidebar :: sidebar('attendance')}"></div>
    <div class="main-content">
        <div class="topbar">
            <h5 th:text="${subject.subjectName} + ' — Attendance'">Attendance</h5>
            <a th:href="@{/faculty/attendance}" class="btn btn-sm btn-outline-secondary"><i class="fa-solid fa-arrow-left"></i> Back</a>
        </div>
        <div class="content-area">
            <div class="panel mb-3">
                <form method="get" th:action="@{'/faculty/attendance/' + ${subject.subjectId}}" class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label">Date</label>
                        <input type="date" name="date" class="form-control" th:value="${attendanceDate}" onchange="this.form.submit()">
                    </div>
                </form>
            </div>

            <div class="panel">
                <form th:action="@{'/faculty/attendance/' + ${subject.subjectId} + '/save'}" method="post">
                    <input type="hidden" name="attendanceDate" th:value="${attendanceDate}">
                    <table class="table table-hover align-middle">
                        <thead>
                        <tr><th>Register No.</th><th>Student Name</th><th style="width:320px;">Status</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="row : ${rows}">
                            <td th:text="${row[0].registerNumber}">Reg</td>
                            <td th:text="${row[0].fullName}">Name</td>
                            <td>
                                <div class="d-flex gap-3">
                                    <div class="form-check" th:each="st : ${statuses}">
                                        <input class="form-check-input" type="radio"
                                               th:name="'status_' + ${row[0].studentId}"
                                               th:id="${'status_' + row[0].studentId + '_' + st}"
                                               th:value="${st}"
                                               th:checked="${row[1] != null and row[1].status == st}">
                                        <label class="form-check-label" th:for="${'status_' + row[0].studentId + '_' + st}" th:text="${st}">PRESENT</label>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(rows)}">
                            <td colspan="3" class="text-muted text-center">No students found for this subject's semester.</td>
                        </tr>
                        </tbody>
                    </table>
                    <button class="btn btn-primary" type="submit" th:if="${not #lists.isEmpty(rows)}">
                        <i class="fa-solid fa-floppy-disk"></i> Save Attendance
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
