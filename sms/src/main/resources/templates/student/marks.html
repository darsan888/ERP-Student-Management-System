<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks &amp; GPA | CampusERP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/student-sidebar :: sidebar('marks')}"></div>
    <div class="main-content">
        <div class="topbar">
            <h5>Marks &amp; GPA</h5>
            <div class="d-flex align-items-center gap-3">
                <span class="text-muted small" th:text="${student.registerNumber}">REG</span>
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <button class="btn btn-sm btn-outline-danger" type="submit"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                </form>
            </div>
        </div>
        <div class="content-area">
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="stat-card bg-green">
                        <i class="fa-solid fa-chart-simple bg-icon"></i>
                        <div class="label">Average Marks</div>
                        <h2 th:text="${average} + '%'">0%</h2>
                    </div>
                </div>
            </div>
            <div class="panel">
                <h6 class="fw-bold mb-3">All Marks</h6>
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Exam Type</th>
                        <th>Marks Obtained</th>
                        <th>Max Marks</th>
                        <th>Grade</th>
                        <th>Exam Date</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="m : ${marksList}">
                        <td th:text="${m.subject.subjectName}">Subject</td>
                        <td th:text="${m.examType}">INTERNAL1</td>
                        <td th:text="${m.marksObtained}">0</td>
                        <td th:text="${m.maxMarks}">100</td>
                        <td th:text="${m.grade} ?: '-'">A</td>
                        <td th:text="${m.examDate}">-</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(marksList)}">
                        <td colspan="6" class="text-muted text-center">No marks published yet.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
