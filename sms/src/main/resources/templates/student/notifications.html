<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | CampusERP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/student-sidebar :: sidebar('notifications')}"></div>
    <div class="main-content">
        <div class="topbar">
            <h5>Notifications</h5>
            <div class="d-flex align-items-center gap-3">
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <button class="btn btn-sm btn-outline-danger" type="submit"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                </form>
            </div>
        </div>
        <div class="content-area">
            <div class="panel">
                <h6 class="fw-bold mb-3">All Notifications</h6>
                <div class="list-group">
                    <div class="list-group-item" th:each="n : ${notifications}">
                        <div class="d-flex justify-content-between">
                            <strong th:text="${n.title}">Title</strong>
                            <span class="badge bg-secondary" th:text="${n.notificationType}">GENERAL</span>
                        </div>
                        <p class="mb-1" th:text="${n.message}">Message</p>
                        <small class="text-muted" th:text="${n.createdAt}">date</small>
                    </div>
                    <div class="list-group-item text-muted text-center" th:if="${#lists.isEmpty(notifications)}">No notifications.</div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
