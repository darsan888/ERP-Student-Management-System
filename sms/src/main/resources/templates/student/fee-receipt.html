<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fee Receipt | CampusERP</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; color: #111; margin: 40px; }
        .receipt-box { max-width: 560px; margin: 0 auto; border: 2px solid #333; padding: 30px; border-radius: 10px; }
        h1 { font-size: 20px; text-align: center; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 8px 4px; font-size: 14px; }
        td.label { color: #666; width: 45%; }
        td.value { font-weight: 600; text-align: right; }
        .total-row td { border-top: 2px solid #333; padding-top: 14px; font-size: 16px; }
        .print-bar { text-align: center; margin-bottom: 20px; }
        @media print { .print-bar { display: none; } }
    </style>
</head>
<body>
<div class="print-bar">
    <button onclick="window.print()">Print / Save as PDF</button>
</div>
<div class="receipt-box">
    <h1>CampusERP — Fee Receipt</h1>
    <div class="subtitle">Official Payment Receipt</div>
    <table>
        <tr><td class="label">Receipt No.</td><td class="value" th:text="${fee.receiptNumber}">-</td></tr>
        <tr><td class="label">Student Name</td><td class="value" th:text="${student.fullName}">-</td></tr>
        <tr><td class="label">Register No.</td><td class="value" th:text="${student.registerNumber}">-</td></tr>
        <tr><td class="label">Semester</td><td class="value" th:text="${fee.semester != null ? fee.semester.semesterNumber : '-'}">-</td></tr>
        <tr><td class="label">Paid Date</td><td class="value" th:text="${fee.paidDate}">-</td></tr>
        <tr><td class="label">Total Amount</td><td class="value" th:text="${fee.totalAmount}">0</td></tr>
        <tr class="total-row"><td class="label">Amount Paid</td><td class="value" th:text="${fee.paidAmount}">0</td></tr>
    </table>
</div>
</body>
</html>
