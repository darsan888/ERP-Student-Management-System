<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Leave | CampusERP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/student-sidebar :: sidebar('leaves')}"></div>
    <div class="main-content">
        <div class="topbar">
            <h5>Apply Leave</h5>
            <div class="d-flex align-items-center gap-3">
                <span class="text-muted small" th:text="${student.registerNumber}">REG</span>
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <button class="btn btn-sm btn-outline-danger" type="submit"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                </form>
            </div>
        </div>
        <div class="content-area">
            <div class="panel mb-4">
                <h6 class="fw-bold mb-3">New Leave Request</h6>
                <form th:action="@{/student/leaves/apply}" method="post" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">From Date</label>
                        <input type="date" name="fromDate" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">To Date</label>
                        <input type="date" name="toDate" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Reason</label>
                        <input type="text" name="reason" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Approving Faculty</label>
                        <select name="facultyId" class="form-select">
                            <option value="">-- Select faculty --</option>
                            <option th:each="f : ${facultyList}" th:value="${f.facultyId}" th:text="${f.fullName}">Faculty</option>
                        </select>
                    </div>
                    <div class="col-12 text-end">
                        <button class="btn btn-primary" type="submit"><i class="fa-solid fa-paper-plane"></i> Apply</button>
                    </div>
                </form>
            </div>
            <div class="panel">
                <h6 class="fw-bold mb-3">My Leave History</h6>
                <table class="table table-hover align-middle">
                    <thead>
                    <tr><th>Reason</th><th>From</th><th>To</th><th>Status</th><th>Applied On</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="l : ${leaveRequests}">
                        <td th:text="${l.reason}">Reason</td>
                        <td th:text="${l.fromDate}">-</td>
                        <td th:text="${l.toDate}">-</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${l.status.name() == 'APPROVED'} ? 'bg-success' : (${l.status.name() == 'REJECTED'} ? 'bg-danger' : 'bg-warning text-dark')"
                                  th:text="${l.status}">PENDING</span>
                        </td>
                        <td th:text="${l.appliedAt}">-</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(leaveRequests)}">
                        <td colspan="5" class="text-muted text-center">No leave requests yet.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
